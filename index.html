<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Merchant Financing Comparison Tool</title><style>
*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f8fafc;color:#0f172a}button,input,select,textarea{font:inherit}main{max-width:1280px;margin:0 auto;padding:32px 20px 56px}header{display:flex;justify-content:space-between;gap:20px;align-items:flex-end;margin-bottom:24px}h1{font-size:clamp(32px,5vw,56px);line-height:1;margin:4px 0 10px}h2,h3,p{margin:0}.eyebrow{font-size:13px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#047857}.primary,.actions button{display:inline-flex;align-items:center;gap:8px;border:0;border-radius:16px;background:#059669;color:white;padding:10px 14px;font-weight:700;cursor:pointer}.hero,.card{background:white;border:1px solid #e2e8f0;border-radius:28px;box-shadow:0 10px 30px rgba(15,23,42,.05)}.hero{display:grid;grid-template-columns:2fr repeat(3,1fr);gap:18px;align-items:center;margin-bottom:18px;padding:22px}.rec{color:#047857;font-weight:800}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}.card{padding:20px}.recommended{border-color:#34d399;box-shadow:0 0 0 3px #d1fae5}.cardtop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}.cardtop h3{font-size:22px}.cardtop p{color:#64748b}.actions{display:flex;gap:8px}.actions button{background:white;color:#334155;border:1px solid #e2e8f0;padding:8px 10px}.inputs{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.field{display:flex;flex-direction:column;gap:5px;color:#64748b;font-size:12px;font-weight:700}.field input,.field select,.field textarea{width:100%;border:1px solid #cbd5e1;border-radius:12px;background:white;color:#0f172a;padding:9px 10px}.field textarea{min-height:82px;resize:vertical}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0;padding:14px;border-radius:20px;background:#f8fafc}.metric span{display:block;font-size:12px;color:#64748b}.metric strong{display:block;margin-top:2px;font-size:16px}.metric .good{color:#047857}.stips{margin-bottom:14px}.stips b{display:flex;align-items:center;gap:8px;margin-bottom:10px}.stips div{display:flex;flex-wrap:wrap;gap:7px}.stips button{border:1px solid #e2e8f0;border-radius:999px;background:white;color:#64748b;padding:6px 10px;font-size:12px;cursor:pointer}.stips button.active{border-color:#86efac;background:#ecfdf5;color:#047857}.badge{display:inline-block;margin-left:8px;border-radius:999px;background:#059669;color:white;font-size:11px;padding:4px 8px}@media(max-width:900px){header,.hero{display:block}.hero{padding:18px}.hero .metric{margin-top:14px}.grid{grid-template-columns:1fr}.inputs,.metrics{grid-template-columns:repeat(2,1fr)}}@media(max-width:560px){main{padding:20px 12px}.inputs,.metrics{grid-template-columns:1fr}.cardtop{display:block}.actions{margin-top:10px}}
</style></head><body><main><header><div><p class="eyebrow">LendingTree</p><h1>Merchant Financing Comparison Tool</h1><p>Compare merchant funding options, payment structure, net funding, total repayment, stipulations, and quote notes.</p></div><button class="primary" id="addQuote">+ Add quote</button></header><section id="hero"></section><section class="grid" id="quotes"></section></main><script>
const lenderConfig=[{lender:'OnDeck',prepayType:'Standard',standardPrepayPct:.25,has100Prepay:true},{lender:'Forward Financing',prepayType:'Custom Prepay',standardPrepayPct:null,has100Prepay:false},{lender:'Kapitus',prepayType:'Standard',standardPrepayPct:.1,has100Prepay:true},{lender:'Mulligan',prepayType:'Standard',standardPrepayPct:.5,has100Prepay:true},{lender:'Byzfunder',prepayType:'Custom Prepay',standardPrepayPct:null,has100Prepay:false},{lender:'Bitty Advance',prepayType:'Custom Prepay',standardPrepayPct:null,has100Prepay:false},{lender:'Expansion Capital',prepayType:'Custom Prepay',standardPrepayPct:null,has100Prepay:false},{lender:'Pearl Capital',prepayType:'Custom Prepay',standardPrepayPct:null,has100Prepay:false},{lender:'CAN Capital',prepayType:'Standard',standardPrepayPct:.3,has100Prepay:false},{lender:'Vox Funding',prepayType:'Custom Prepay',standardPrepayPct:null,has100Prepay:false},{lender:'Samson',prepayType:'Custom Prepay',standardPrepayPct:null,has100Prepay:false},{lender:'Peac Solutions',prepayType:'Standard',standardPrepayPct:.3,has100Prepay:true},{lender:'BriteCap',prepayType:'Custom Prepay',standardPrepayPct:null,has100Prepay:false},{lender:'Bluevine',prepayType:'Standard',standardPrepayPct:null,has100Prepay:true}];
const stips=['Drivers License','Voided Check','Bank Verification','Month to Date Transactions','ID Verification','Tax Return','Aging A/R','Aging A/P','YTD P&L','Year End P&L','YTD Balance Sheet','Year End Balance Sheet','8821','TruPic','Payoff Letter','Transfer Account Bank Statements','Merchant Interview'];
const uid=()=>Math.random().toString(36).slice(2);let quotes=[{id:uid(),lender:'Forward Financing',prepayOption:'Standard',fundingAmount:175000,outstandingBalance:122189.1,interestWaived:0,paymentStructure:'Weekly',numberOfPayments:72,originationFeePct:.03,manualOriginationFee:5250,interestRate:.44,recommended:false,notes:'',stipulations:{'Drivers License':true,'Voided Check':true}},{id:uid(),lender:'Forward Financing',prepayOption:'Standard',fundingAmount:200000,outstandingBalance:122189.1,interestWaived:0,paymentStructure:'Weekly',numberOfPayments:72,originationFeePct:.03,manualOriginationFee:6000,interestRate:.44,recommended:false,notes:'',stipulations:{'Drivers License':true,'Voided Check':true,'Bank Verification':true}},{id:uid(),lender:'OnDeck',prepayOption:'Standard',fundingAmount:100000,outstandingBalance:10000,interestWaived:0,paymentStructure:'Weekly',numberOfPayments:26,originationFeePct:null,manualOriginationFee:1000,interestRate:.15,recommended:false,notes:'',stipulations:{'Drivers License':true}},{id:uid(),lender:'OnDeck',prepayOption:'Standard',fundingAmount:100000,outstandingBalance:10000,interestWaived:0,paymentStructure:'Weekly',numberOfPayments:26,originationFeePct:null,manualOriginationFee:125,interestRate:.15,recommended:false,notes:'',stipulations:{}},{id:uid(),lender:'OnDeck',prepayOption:'Standard',fundingAmount:100000,outstandingBalance:10000,interestWaived:10000,paymentStructure:'Weekly',numberOfPayments:26,originationFeePct:.0125,manualOriginationFee:0,interestRate:.15,recommended:true,notes:'',stipulations:{}}];
const money=v=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(Number(v||0));const pct=v=>v===null||v===undefined||v===''?'—':new Intl.NumberFormat('en-US',{style:'percent',maximumFractionDigits:2}).format(Number(v));
function months(s,p){p=Number(p||0);return s==='Daily'?p/21:s==='Weekly'?p/4.33:s==='Bi Weekly'?p/2.166:p}function prepay(q){const c=lenderConfig.find(x=>x.lender===q.lender);if(!c)return'—';if(c.prepayType==='Custom Prepay')return'Custom';if(q.prepayOption==='100%'&&c.has100Prepay)return'100%';if(typeof c.standardPrepayPct==='number')return pct(c.standardPrepayPct);return c.has100Prepay?'100%':'—'}function calc(q){const funding=Number(q.fundingAmount||0),payments=Number(q.numberOfPayments||0),rate=Number(q.interestRate||0),feePct=q.originationFeePct===null||q.originationFeePct===''?null:Number(q.originationFeePct),originationFee=feePct===null?Number(q.manualOriginationFee||0):funding*feePct,totalRepayment=funding*(1+rate),paymentAmount=payments?totalRepayment/payments:0,netFunding=funding-Number(q.outstandingBalance||0)+Number(q.interestWaived||0)-originationFee;return{...q,originationFee,totalRepayment,paymentAmount,netFunding,months:months(q.paymentStructure,payments),prepaymentDiscount:prepay(q)}}
function metric(label,value,good=''){return`<div class="metric"><span>${label}</span><strong class="${good?'good':''}">${value}</strong></div>`}function field(label,body){return`<label class="field"><span>${label}</span>${body}</label>`}function options(arr,value){return arr.map(x=>`<option ${x===value?'selected':''}>${x}</option>`).join('')}
function render(){const cs=quotes.map(calc);const rec=cs.find(q=>q.recommended)||[...cs].sort((a,b)=>b.netFunding-a.netFunding)[0];document.getElementById('hero').className='hero';document.getElementById('hero').innerHTML=`<div><div class="rec">🏆 Recommended quote</div><h2>${rec.lender}</h2><p>${rec.paymentStructure} · ${rec.numberOfPayments} payments · ${rec.months.toFixed(1)} months</p></div>${metric('Funding',money(rec.fundingAmount))}${metric('Net funding',money(rec.netFunding),true)}${metric('Payment',money(rec.paymentAmount))}`;document.getElementById('quotes').innerHTML=cs.map((q,i)=>`<article class="card ${q.recommended?'recommended':''}" data-id="${q.id}"><div class="cardtop"><div><h3>Quote ${i+1}${q.recommended?'<span class="badge">Recommended</span>':''}</h3><p>${q.lender}</p></div><div class="actions"><button data-act="recommend">Recommend</button><button data-act="remove">Delete</button></div></div><div class="inputs">${field('Lender',`<select data-field="lender">${lenderConfig.map(x=>`<option ${x.lender===q.lender?'selected':''}>${x.lender}</option>`).join('')}</select>`)}${field('Prepay option',`<select data-field="prepayOption">${options(['Standard','100%','Custom'],q.prepayOption)}</select>`)}${field('Payment structure',`<select data-field="paymentStructure">${options(['Daily','Weekly','Bi Weekly','Monthly'],q.paymentStructure)}</select>`)}${field('Funding amount',`<input type="number" data-field="fundingAmount" value="${q.fundingAmount}">`)}${field('Outstanding balance',`<input type="number" data-field="outstandingBalance" value="${q.outstandingBalance}">`)}${field('Interest waived',`<input type="number" data-field="interestWaived" value="${q.interestWaived}">`)}${field('Payments',`<input type="number" data-field="numberOfPayments" value="${q.numberOfPayments}">`)}${field('Interest rate',`<input type="number" step="0.001" data-field="interestRate" value="${q.interestRate}">`)}${field('Origination fee %',`<input type="number" step="0.0001" data-field="originationFeePct" value="${q.originationFeePct??''}">`)}${field('Manual fee',`<input type="number" data-field="manualOriginationFee" value="${q.manualOriginationFee}">`)}</div><div class="metrics">${metric('Term',q.months.toFixed(1)+' mo')}${metric('Payment',money(q.paymentAmount))}${metric('Repayment',money(q.totalRepayment))}${metric('Net funding',money(q.netFunding),true)}${metric('Origination fee',money(q.originationFee))}${metric('Prepay discount',q.prepaymentDiscount)}${metric('Rate',pct(q.interestRate))}${metric('Fee basis',q.originationFeePct===null||q.originationFeePct===''?'Manual $':pct(q.originationFeePct))}</div><div class="stips"><b>📄 Stipulations requested</b><div>${stips.map(s=>`<button data-stip="${s}" class="${q.stipulations?.[s]?'active':''}">${q.stipulations?.[s]?'✓ ':''}${s}</button>`).join('')}</div></div>${field('Quote-specific notes',`<textarea data-field="notes" placeholder="Add notes for this quote...">${q.notes||''}</textarea>`)}</article>`).join('')}
function update(id,patch){quotes=quotes.map(q=>q.id===id?{...q,...patch}:q);render()}document.addEventListener('input',e=>{const card=e.target.closest('.card');if(!card||!e.target.dataset.field)return;const f=e.target.dataset.field;let v=e.target.value;if(['fundingAmount','outstandingBalance','interestWaived','numberOfPayments','interestRate','manualOriginationFee'].includes(f))v=v===''?'':Number(v);if(f==='originationFeePct')v=v===''?null:Number(v);update(card.dataset.id,{[f]:v})});document.addEventListener('change',e=>{const card=e.target.closest('.card');if(card&&e.target.dataset.field)update(card.dataset.id,{[e.target.dataset.field]:e.target.value})});document.addEventListener('click',e=>{const card=e.target.closest('.card');if(e.target.id==='addQuote'){quotes.push({id:uid(),lender:'OnDeck',prepayOption:'Standard',fundingAmount:100000,outstandingBalance:0,interestWaived:0,paymentStructure:'Weekly',numberOfPayments:26,originationFeePct:null,manualOriginationFee:0,interestRate:.15,recommended:false,notes:'',stipulations:{}});render()}if(!card)return;if(e.target.dataset.act==='recommend'){quotes=quotes.map(q=>({...q,recommended:q.id===card.dataset.id}));render()}if(e.target.dataset.act==='remove'&&quotes.length>1){quotes=quotes.filter(q=>q.id!==card.dataset.id);render()}if(e.target.dataset.stip){quotes=quotes.map(q=>q.id===card.dataset.id?{...q,stipulations:{...q.stipulations,[e.target.dataset.stip]:!q.stipulations?.[e.target.dataset.stip]}}:q);render()}});render();
</script></body></html>
